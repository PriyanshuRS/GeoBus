<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver Simulator</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: monospace; padding: 2rem; background: #1e272e; color: #05c46b; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #ff3f34; color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 20px;}
        #logs { background: #000; padding: 15px; border-radius: 8px; height: 300px; overflow-y: scroll; color: #d2dae2; }
    </style>
</head>
<body>
    <h1>👻 Ghost Driver (Route 101)</h1>
    <p>This script bypasses React Native Web to simulate a moving bus.</p>
    
    <button id="startBtn" onclick="startDriving()">Start Driving</button>
    
    <div id="logs">Waiting to start...<br></div>

    <script>
        const socket = io('http://localhost:3000');
        const logs = document.getElementById('logs');
        let driveInterval;

        // Starting at Route 101 - Point A (New York Downtown)
        let currentLat = 40.7128;
        const currentLng = -74.0060;

        function logToScreen(message) {
            logs.innerHTML += `> ${message}<br>`;
            logs.scrollTop = logs.scrollHeight;
        }

        socket.on('connect', () => logToScreen(`✅ Connected to Backend. ID: ${socket.id}`));

        function startDriving() {
            document.getElementById('startBtn').style.display = 'none';
            logToScreen('🚀 Engine started. Beginning to broadcast location...');

            // Broadcast a new location every 2 seconds
            driveInterval = setInterval(() => {
                // Mathematically move the bus North slightly
                currentLat += 0.0005; 

                const payload = {
                    routeId: 1,
                    coordinates: { lat: currentLat, lng: currentLng }
                };

                // Emit to the Node server
                socket.emit('driverLocationUpdate', payload);
                logToScreen(`📍 Broadcasted: ${currentLat.toFixed(5)}, ${currentLng}`);
            }, 2000);
        }
    </script>
</body>
</html>
