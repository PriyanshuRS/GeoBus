<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanpur Transit - Ghost Driver Simulator</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 2rem; 
            background: #121824; 
            color: #d2dae2; 
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e272e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2f3542;
        }
        h1 { 
            font-size: 24px;
            color: #2ed573; 
            margin-top: 0;
            text-align: center;
            text-shadow: 0 0 10px rgba(46, 213, 115, 0.2);
        }
        p {
            color: #747d8c;
            text-align: center;
            font-size: 14px;
        }
        .control-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-weight: bold;
            color: #a4b0be;
            font-size: 14px;
        }
        select { 
            padding: 12px; 
            font-size: 15px; 
            background: #2f3542; 
            color: white; 
            border: 1px solid #57606f; 
            border-radius: 8px;
            outline: none;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button { 
            flex: 1;
            padding: 14px; 
            font-size: 16px; 
            cursor: pointer; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold;
            transition: all 0.2s ease;
        }
        #startBtn { background: #2ed573; }
        #startBtn:hover { background: #26af5f; }
        #pauseBtn { background: #ffa502; display: none; }
        #pauseBtn:hover { background: #e09000; }
        #logs { 
            background: #0c1015; 
            padding: 15px; 
            border-radius: 8px; 
            height: 250px; 
            overflow-y: scroll; 
            font-family: monospace; 
            color: #05c46b; 
            border: 1px solid #2f3542;
            font-size: 13px;
            line-height: 1.5;
        }
        .badge {
            background: #ff4757;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ghost Driver Route Simulator</h1>
        <p>Bypasses actual vehicle telemetry to broadcast synthetic transit routes to active passengers.</p>
        
        <div class="control-group">
            <label for="routeSelect">Select Transit Route:</label>
            <select id="routeSelect" onchange="resetSimulatorState()">
                <option value="2">Route 201 - IIT Kanpur to Kanpur Central</option>
                <option value="3">Route 202 - Kidwai Nagar to Moti Jheel</option>
                <option value="4">Route 203 - Central to Kidwai Nagar Shuttle</option>
            </select>
        </div>
        
        <div class="btn-row">
            <button id="startBtn" onclick="toggleDriving()">Start Driving Simulation</button>
            <button id="pauseBtn" onclick="togglePauseStationary()">Simulate Heavy Traffic (Stationary)</button>
        </div>
        
        <div id="logs">System idle. Ready to broadcast telemetry...<br></div>
    </div>

    <script>
        const socket = io('http://localhost:3000');
        const logs = document.getElementById('logs');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        
        let driveInterval;
        let isDriving = false;
        let isStationary = false;
        
        let currentStep = 0;
        let currentNodeIndex = 0;
        const STEPS_BETWEEN_NODES = 20;

        const routesData = {
            "2": [
                { lat: 26.5123, lng: 80.2329 }, 
                { lat: 26.4950, lng: 80.2600 },
                { lat: 26.4820, lng: 80.3010 },
                { lat: 26.4764, lng: 80.3235 },
                { lat: 26.4542, lng: 80.3512 }
            ],
            "3": [
                { lat: 26.4258, lng: 80.3444 },
                { lat: 26.4380, lng: 80.3150 },
                { lat: 26.4590, lng: 80.3100 },
                { lat: 26.4764, lng: 80.3235 }
            ],
            "4": [
                { lat: 26.4542, lng: 80.3512 },
                { lat: 26.4440, lng: 80.3550 },
                { lat: 26.4258, lng: 80.3444 }
            ]
        };

        function logToScreen(message, color = "#05c46b") {
            logs.innerHTML += `<span style="color: ${color}">> ${message}</span><br>`;
            logs.scrollTop = logs.scrollHeight;
        }

        socket.on('connect', () => logToScreen(`Connected to WebSocket gateway. ID: ${socket.id}`, "#2ed573"));
        socket.on('disconnect', () => logToScreen(`Disconnected from WebSocket gateway.`, "#ff4757"));

        let lastPos = null;

        function getDistanceInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const phi1 = lat1 * Math.PI / 180;
            const phi2 = lat2 * Math.PI / 180;
            const dPhi = (lat2 - lat1) * Math.PI / 180;
            const dLambda = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dPhi/2) * Math.sin(dPhi/2) +
                      Math.cos(phi1) * Math.cos(phi2) *
                      Math.sin(dLambda/2) * Math.sin(dLambda/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function resetSimulatorState() {
            currentStep = 0;
            currentNodeIndex = 0;
            lastPos = null;
            if (isDriving) {
                logToScreen("Route changed. Restarted position to start of route.");
            }
        }

        function getInterpolatedCoordinate(routeId, nodeIndex, step) {
            const coords = routesData[routeId];
            if (!coords) return null;
            if (nodeIndex >= coords.length - 1) return coords[coords.length - 1];
            
            const p1 = coords[nodeIndex];
            const p2 = coords[nodeIndex + 1];
            
            const lat = p1.lat + (p2.lat - p1.lat) * (step / STEPS_BETWEEN_NODES);
            const lng = p1.lng + (p2.lng - p1.lng) * (step / STEPS_BETWEEN_NODES);
            
            return { lat, lng };
        }

        function toggleDriving() {
            if (!isDriving) {
                isDriving = true;
                startBtn.innerHTML = "Stop Driving Simulation";
                startBtn.style.background = "#ff4757";
                pauseBtn.style.display = "block";
                logToScreen("Engine ignited. Emulation stream online...");
                
                driveInterval = setInterval(() => {
                    const routeId = document.getElementById('routeSelect').value;
                    const coords = routesData[routeId];
                    
                    const currentPos = getInterpolatedCoordinate(routeId, currentNodeIndex, currentStep);
                    if (!currentPos) return;

                    let speed = 0;
                    if (isStationary) {
                        speed = 0;
                    } else if (lastPos) {
                        const dist = getDistanceInMeters(lastPos.lat, lastPos.lng, currentPos.lat, currentPos.lng);
                        speed = dist / 2;
                    } else {
                        speed = 5;
                    }

                    lastPos = currentPos;

                    const payload = {
                        routeId: parseInt(routeId),
                        coordinates: currentPos,
                        speed: speed
                    };

                    socket.emit('driverLocationUpdate', payload);
                    
                    if (isStationary) {
                        logToScreen(`Stationary Broadcast: ${currentPos.lat.toFixed(5)}, ${currentPos.lng.toFixed(5)} (Route ${routeId}) [0.00 m/s]`, "#ffa502");
                    } else {
                        logToScreen(`Emulated Bus Location: ${currentPos.lat.toFixed(5)}, ${currentPos.lng.toFixed(5)} (Route ${routeId}) [${speed.toFixed(2)} m/s / ${(speed * 3.6).toFixed(1)} km/h]`, "#05c46b");
                        
                        currentStep++;
                        if (currentStep > STEPS_BETWEEN_NODES) {
                            currentStep = 0;
                            currentNodeIndex++;
                            if (currentNodeIndex >= coords.length - 1) {
                                logToScreen("Terminus reached! Resetting simulator to start of route.", "#ffa502");
                                currentNodeIndex = 0;
                            }
                        }
                    }
                }, 2000);
            } else {
                isDriving = false;
                clearInterval(driveInterval);
                startBtn.innerHTML = "Start Driving Simulation";
                startBtn.style.background = "#2ed573";
                pauseBtn.style.display = "none";
                logToScreen("Simulation stopped. Engine shutdown.");
            }
        }

        function togglePauseStationary() {
            isStationary = !isStationary;
            if (isStationary) {
                pauseBtn.innerHTML = "Resume Movement Simulation";
                pauseBtn.style.background = "#2ed573";
                logToScreen("Traffic lock enabled. Simulating stationary bus at current position.", "#ffa502");
            } else {
                pauseBtn.innerHTML = "Simulate Heavy Traffic (Stationary)";
                pauseBtn.style.background = "#ffa502";
                logToScreen("Traffic cleared. Resuming bus route progression.", "#2ed573");
            }
        }
    </script>
</body>
</html>
